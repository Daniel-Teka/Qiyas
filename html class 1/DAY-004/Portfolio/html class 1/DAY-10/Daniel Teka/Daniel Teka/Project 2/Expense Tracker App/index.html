<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="tracker-container">
        <header class="tracker-header">
            <h1>Expense Tracker</h1>
            <div class="balance-box">
                <h2>Your Balance</h2>
                <span id="total-balance">$0.00</span>
            </div>
        </header>

        <section class="summary-panel">
            <div class="summary-card income">
                <h3>Income</h3>
                <p id="summary-income">+$0.00</p>
            </div>
            <div class="summary-card expense">
                <h3>Expense</h3>
                <p id="summary-expense">-$0.00</p>
            </div>
        </section>

        <section class="transaction-form-section">
            <h3>Add New Transaction</h3>
            <form id="transaction-form">
                <div class="form-control">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Groceries, Salary..." required autocomplete="off">
                </div>

                <div class="form-control">
                    <label>Amount Type</label>
                    <div class="type-toggle-group">
                        <button type="button" id="type-income" class="toggle-btn active">Income</button>
                        <button type="button" id="type-expense" class="toggle-btn">Expense</button>
                    </div>
                </div>

                <div class="form-control">
                    <input type="number" id="amount" placeholder="Enter amount..." min="0.01" step="0.01" required>
                </div>

                <button type="submit" class="submit-btn">Add Transaction</button>
            </form>
        </section>

        <section class="history-section">
            <h3>History</h3>
            <div id="history-feed" class="history-feed">
                </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
