<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="1" />
    <title>Document</title>
    <style>
        nav{
            display: flex;
            background-color: rgb(209, 160, 160);
            justify-content: space-between;
            
        }
        nav ul {
            display: flex;
            flex-direction: row;
            float: left;
            /*gap: 20px;*/
            font-size: 32px;
        }
        nav ul li{
            color: #000;
            list-style-type: none;
        }
        nav ul li a{
            color: white;
            font-size: 32px;
            text-decoration: none;
            text-transform: capitalize;
            list-style-type: none;
        }
        nav ul li a:hover{
            color:chartreuse ;
        }
        .container{
            display: flex;
            background-color: dodgerblue;
            font-size: 30px;
            color: white;
            justify-content: space-around;
            }
        .container div{
            background-color: #c10decc;
            width: 100px;
            margin: 10px;
            padding: 10px;
            font: 2em sans-serif;
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Service</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
