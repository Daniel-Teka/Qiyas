<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="01"/>
    <title>Document</title>
    <style>
        *{
            margin: 2px;
            padding: 2px;
            box-sizing: border-box;
        }
        body{
            height: 1000px;
        }
        div{
            font-size: 32px;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            text-align: center;
            color: #000;
            border: 2px solid black;
            height: 30%;
            width: 30%;
            border-radius: 6px;
        }
        .div-i{
            display:block;
            width: 30%;
            background-color: rgba(0, 128, 0, 0.456);

        }
        .div-ii{
            background-color: #ffff;
            visibility:visible;
            background-color: rgba(0, 0, 255, 0.446);
            
        }
        .div3{
            width: 30%;
        
        }
    </style>
</head>
<body>
    <h1></h1>

<!--first division-->
    <div class="div-i">

        sample 1
    </div>

<!--second division-->
    <div class="div-ii">

        sample 2
    </div>
    <div class="div3">
        div 3
    </div>

</body>
</html>
