<!DOCTYPE html>
<html lang="en">
    <head>
        <meta http-equiv="refresh" content="1">
    </head>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <style>
        .container{
            display: grid;
            grid-template-columns: auto auto auto;
            background-color: dodgerblue;
            padding: 10px;
        }
        .container div{
            background-color: #acc;
            border: 1px solid blue;
            padding: 2px;
            font-size: 32px;
            text-align: center;
        }
        .container div img{
            border-radius: 5px;
        }
        img {
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <img src="laptop.png" alt="laptop">
            <pre>
                Product Name : Laptop <br>
                price :55000 <br>
                Brand :HP <br>

            </pre>
        </div>
        <div><img src="laptop.png" alt="laptop"></div>
        <div><img src="laptop.png" alt="laptop"></div>
        <div><img src="laptop.png" alt="laptop"></div>
        <div><img src="laptop.png" alt="laptop"></div>
        <div><img src="laptop.png" alt="laptop"></div>
        <div><img src="laptop.png" alt="laptop"></div>
    </div>
</body>
</html>
