<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h3 {
            background-color: #e3cbcb;
            font-size:40px;
            margin-left: 0%;
        }
        div > h1{
            background-color: aqua;
            margin-left: 5%;
        }
        div section h1{
            background-color: bisque;
            width: 90%;
            margin-left: 10%;
        }
        #green{
            border: 1px solid black;
        }
        #red{
            color: rgb(8, 8, 8);
            border: 10px dotted red;
            padding: 30px 20px;
            margin-left: 30px;
            margin-bottom: 0px;
            margin-top: 20px;
            margin-right: 40px;

        }

    </style>
</head>
<body>
    <h3 id="green">Child selector</h3>
    <div>
        <h1 id="red">
            Child 1
        </h1>
        <h1>Child 2</h1>
        <h1>Child 3</h1>
        <section>
            <h1>Sub Child 1</h1>
            <h1>Sub Child 2</h1>
            <h1>Sub Child 3</h1>
        </section>
        
    </div>
    
</body>
</html>
