<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div h1{
            background-color: aqua;
            width: 50%;
            text-align: center;
        }
        section h1{
            background-color: burlywood;
            width: 50%;
            text-align: center;
            align-self: center;
        }
        div h1 span{
            font-size: 70px;
        }
        body > span{
            background-color: red;
            text-align: center;
            align-self: center;
            transform: translate(-50, -50);
        }/*
         span{
            background: #c32727;
        }*/
        body, div{
            text-align: center;
        }

    </style>
</head>
<body>
    <div>
        <h1>a</h1>
        <h1>a</h1>
        <h1>
            a 
            <span>
                Span 
            </span>
        </h1>
    </div>

    <span>span 1</span>
    <span>span 2</span>

    <section>
        <h1>b</h1>
        <h1>b</h1>
        <h1>b</h1>
    </section>
</body>
</html>
