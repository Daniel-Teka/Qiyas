<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table, tr, th, td {
            border:2px,  rgb(137, 39, 39);
            border-collapse: collapse;
            font-size: 110%;
            color: whitesmoke;
            background-color: blue;
            border-style:solid;
            
            
        }
        table{
            width: 100%;
        }
    </style>
</head>
<body>
    <table >
        <thead>
        <tr>
            <th>Item</th>
            <th>Price</th>
            <th>Rmark</th>
        </tr>
        </thead>
        <tbody>
        <tr style="background-color: black;">
            <td>Comouter</td>
            <td>1000$</td>
            <td>New</td>
        </tr>
        <tr>
            <td>Stands</td>
            <td>500$</td>
            <td>New</td>
        </tr>
        <tr>
            <td>Divider</td>
            <td>100$</td>
            <td>New</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th colspan="2">1</td>
            <td>100</td>
        </tr>
        <tr class="">
            <td rowspan="2">fruits</td>
            <td>2</td>
        </tr>
        <tr class="">
            <td>1</td>
            <td>2</td>
        </tr>
        <tr class="">
            <td rowspan="4">1</td>
            <td>2</td>
        </tr>
        <tr>
            <td>h</td>
        </tr>
        </tfoot>
    </table>
</body>
</html>
